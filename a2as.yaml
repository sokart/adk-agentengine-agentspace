manifest:
  version: "0.1.3"
  schema: https://a2as.org/cert/schema
  subject:
    name: sokart/adk-agentengine-agentspace
    source: https://github.com/sokart/adk-agentengine-agentspace
    branch: main
    commit: "e3e9684c"
    scope: [agent_grammar/agent.py, agent_teaching_assistant/agent.py, deploy_agent_to_agentengine.py, agent_maths/agent.py,
      agent_summary/agent.py]
  issued:
    by: A2AS.org
    at: '2026-02-11T16:37:14Z'
    url: https://a2as.org/certified/agents/sokart/adk-agentengine-agentspace
  signatures:
    digest: sha256:JCZwL3JlRmcF2_X6-t2x9veBQepZimGsKd2noIzHsNY
    key: ed25519:bZGDKe8SntAMxQeEa8-XWd5UCqlYx3A3SLAWI7CTBvY
    sig: ed25519:YTRG1Q11eMSInSx-yuIfq_liKf4pmhwjYDhC8_IrcquORpQ4zsJIZt-lAxzDTVKxxp1MxikPTm7XRwkBm9xkDQ

agents:
  agent_grammar:
    type: instance
    models: [gemini-2.0-flash-001]
    tools: [check_grammar]
    params:
      name: agent_grammar
      description: This agent corrects grammar mistakes in text provided by children, explains the errors in simple terms,
        and returns both the corrected text and the explanations.
      instruction: ['You are a friendly grammar helper for kids.  Analyze the following text,', 'correct any grammar mistakes,
          and explain the errors in a way that a', child can easily understand.  Don't just list the errors; explain them,
        in a paragraph using simple but concise language., 'First, provide the corrected text.', 'Then, leave two new lines.',
        'Finally, provide the explanation. If there are no errors, reply with an empty string "".']
  agent_math:
    type: instance
    models: [gemini-2.5-flash]
    tools: [add, subtract, multiply, divide]
    params:
      name: agent_math
      description: This agent performs basic arithmetic operations (addition, subtraction, multiplication, and division) on
        user-provided numbers, including ranges.
      instruction: ['I can perform addition, subtraction, multiplication, and division operations on numbers you provide.',
        Tell me the numbers you want to operate on., 'For example, you can say ''add 3 5'', ''multiply 2, 4 and 3'', ''Subtract
          10 from 20'', ''Divide 10 by 2''.', 'You can also provide a range: ''Multiply the numbers between 1 and 10''.']
      generate_content_config:
        class: GenerateContentConfig
        temperature: "0.2"
  agent_summary:
    type: instance
    models: [gemini-2.0-flash-001]
    params:
      name: agent_summary
      description: Synthesizes grammar corrections/explanations and math calculation results, presenting them as a single,
        coherent response with a patient and encouraging tone suitable for a young user.
      instruction: ['Prompt for agent_summary:', 'You are agent_summary, a friendly, patient, and encouraging teaching assistant
          simulator. Your primary role is to communicate feedback and results to a young student in a clear, positive, and
          easy-to-understand manner.', 'You will receive input from two other agents:', 'agent_grammar Output:', 'corrected_query:
          The grammatically correct version of the student''s original question.', 'grammar_explanation: An explanation of
          the grammatical errors found in the original query and why the corrections were made.', 'agent_math Output:', 'math_result:
          The numerical answer or result of the calculation requested in the (corrected) query.', '(Optional: calculation_steps:
          If available, the steps taken to reach the result).', 'Your Task:', 'Combine the information from agent_grammar
          and agent_math into a single, coherent response addressed directly to the student (like a child). Your response
          should:', 'Adopt a Teacher-to-Child Tone: Be warm, friendly, positive, and encouraging. Use simple language. Avoid
          jargon or overly complex sentences. Imagine you are speaking to a primary school student.', 'Acknowledge the Question:
          Start with a friendly greeting.', 'Address the Grammar:', 'Gently introduce the grammar feedback. Frame it as helpful
          advice for clearer communication, not criticism.', Present the corrected_query., 'Briefly and simply explain the
          main point(s) from the grammar_explanation using easy-to-understand terms. Focus on why the correction helps make
          the question clearer (e.g., "Using ''were'' instead of ''was'' helps when we talk about more than one thing!").',
        'Address the Math:', Transition smoothly to the math part of the question., Clearly present the math_result., 'If
          calculation_steps are available, present them simply, or offer to show them if asked.', 'Provide Encouragement:
          End with positive reinforcement, praising their effort in asking the question and encouraging them to keep learning
          and asking questions.', 'Structure: Ensure the response flows naturally, integrating both the grammar and math elements
          without just listing them separately.', 'Example Response Structure:', '"Hi there! That''s a great question you
          asked! 😊', 'First, let''s look at how we asked it. Sometimes, changing a word or two can make our questions super
          clear! Instead of [mention original phrasing briefly if needed], saying it like this: ''[Corrected Query]'' is perfect.
          The little change we made was [Simple Grammar Explanation, e.g., ''using ''is'' because we''re talking about one
          thing'']. Well done for spotting that! 👍', 'Now, for the math part you asked about! The answer is: [Math Result].',
        '[Optional: If calculation steps available: ''We figured that out by doing this: [Simple Steps]''. Or ''Would you
          like me to show you how we got that answer?'']', Great job asking your question and doing the math thinking! Keep
          up the fantastic work and keep asking questions! ✨", 'Do:', Be friendly and encouraging., Use simple vocabulary.,
        Explain grammar concepts very simply., Clearly state the math result., Combine the information smoothly., 'Don''t:',
        Be overly technical or use grammatical jargon., Sound critical or corrective., Just list the outputs from the other
          agents., Use complex sentence structures., 'Now, take the inputs from agent_grammar and agent_math and generate
          the response for the student.']
      generate_content_config:
        class: GenerateContentConfig
        temperature: "0.2"
  root_agent:
    type: instance
    params:
      name: agent_teaching_assistant
      description: This agent acts as a friendly teaching assistant, checking the grammar of kids' questions, performing math
        calculations using corrected or original text (if grammatically correct), and providing results or grammar feedback
        in a friendly tone.
      sub_agents: [agent_grammar, agent_math, agent_summary]

models:
  gemini-2.0-flash-001:
    type: literal
    agents: [agent_grammar, agent_summary]
  gemini-2.5-flash:
    type: literal
    agents: [agent_math]

tools:
  add:
    type: function
    agents: [agent_math]
    params:
      description: |-
        Calculates the sum of a list of integers.

        This function takes a list of integers as input and returns the sum of all
        the elements in the list.  It uses the built-in `sum()` function for
        efficiency.

        Args:
            numbers: A list of integers to be added.

        Returns:
            The sum of the integers in the input list.  Returns 0 if the input
            list is empty.

        Examples:
            add([1, 2, 3]) == 6
            add([-1, 0, 1]) == 0
            add([]) == 0
  check_grammar:
    type: function
    agents: [agent_grammar]
    params:
      description: "Checks the grammar of input text and returns corrections and explanations.\n\nThis function uses the Gemini\
        \ API to analyze the provided text for \ngrammatical errors. It returns a dictionary containing the corrected \ntext,\
        \ explanations of the errors, and descriptions of the errors.  The \nGemini API is called with a prompt requesting\
        \ a JSON response in a \nspecific format.  The function handles potential errors in communicating\nwith the Gemini\
        \ API and parsing the JSON response.\n\nArgs:\n    text_input: The input text to be checked for grammar errors.\n\n\
        Returns:\n    A dictionary containing the following keys:\n        \"corrected_text\": The text with grammatical errors\
        \ corrected, or None \n                        if an error occurred.\n        \"explanations\": A list of strings\
        \ explaining each correction made, or\n                        a list containing an error message if an error occurred.\n\
        \        \"errors\": A list of strings describing each error found.  This may\n                  be an empty list\
        \ if no errors were found or if an error\n                  occurred during processing.\n\n    The dictionary structure\
        \ is designed to conform to the following JSON schema:\n\n    ```json\n    {\n      \"type\": \"object\",\n      \"\
        properties\": {\n        \"corrected_text\": {\n          \"type\": \"string\",\n          \"description\": \"The\
        \ corrected text.\"\n        },\n        \"explanations\": {\n          \"type\": \"array\",\n          \"items\"\
        : {\n            \"type\": \"string\",\n            \"description\": \"Explanation of a specific error.\"\n      \
        \    },\n          \"description\": \"An array of explanations for each correction.\"\n        },\n        \"errors\"\
        : {\n          \"type\": \"array\",\n          \"items\": {\n            \"type\": \"string\",\n            \"description\"\
        : \"Description of a specific error.\"\n          },\n          \"description\": \"An array of descriptions of each\
        \ error.\"\n        }\n      },\n      \"required\": [\n        \"corrected_text\",\n        \"explanations\",\n \
        \       \"errors\"\n      ],\n      \"description\": \"A JSON object containing corrected text, explanations, and\
        \ error descriptions.\"\n    }\n    ```\n\n    If an error occurs during communication with the Gemini API or parsing\n\
        \    the JSON response, the \"corrected_text\" will be None and the \"explanations\"\n    list will contain an error\
        \ message. The \"errors\" list might be empty\n    in such cases."
  divide:
    type: function
    agents: [agent_math]
    params:
      description: |-
        Divides numbers in a list sequentially from left to right.

        This function performs division on a list of integers, applying the division
        operation from left to right.  For example, given the list [10, 2, 5], the
        function will calculate 10 / 2 / 5.

        Args:
            numbers: A list of integers to be divided.

        Returns:
            The result of the sequential division as a float.

        Raises:
            ZeroDivisionError: If any number in the list *after* the first element
                               is zero, a ZeroDivisionError is raised.  Division by
                               zero is not permitted.

        Returns:
            float: The result of the division. Returns 0.0 if the input list is empty.

        Examples:
            divide([10, 2, 5]) == 1.0  # (10 / 2) / 5 = 5 / 5 = 1.0
            divide([10, 2]) == 5.0      # 10 / 2 = 5.0
            divide([10, 0, 5])  # Raises ZeroDivisionError
            divide([]) == 0.0
  multiply:
    type: function
    agents: [agent_math]
    params:
      description: |-
        Calculates the product of a list of integers.

        This function takes a list of integers as input and returns the product of all
        the elements in the list. It iterates through the list, multiplying each
        number with the accumulated product.

        Args:
            numbers: A list of integers to be multiplied.

        Returns:
            The product of the integers in the input list. Returns 1 if the input
            list is empty.

        Examples:
            multiply([2, 3, 4]) == 24  # 2 * 3 * 4 = 24
            multiply([1, -2, 5]) == -10 # 1 * -2 * 5 = -10
            multiply([]) == 1
  subtract:
    type: function
    agents: [agent_math]
    params:
      description: |-
        Subtracts numbers in a list sequentially from left to right.

        This function performs subtraction on a list of integers, applying the
        subtraction operation from left to right.  For example, given the list
        [10, 2, 5], the function will calculate 10 - 2 - 5.

        Args:
            numbers: A list of integers to be subtracted.

        Returns:
            The result of the sequential subtraction as an integer. Returns 0 if the input list is empty.

        Examples:
            subtract([10, 2, 5]) == 3  # (10 - 2) - 5 = 8 - 5 = 3
            subtract([10, 2]) == 8      # 10 - 2 = 8
            subtract([]) == 0

teams:
  root_agent:
    type: sequential
    agents: [root_agent, agent_grammar, agent_math, agent_summary]

imports:
  AdkApp: vertexai.preview.reasoning_engines.AdkApp
  Agent: google.adk.agents.Agent
  agent_engines: vertexai.agent_engines
  agent_grammar: agent_grammar.agent.agent_grammar
  agent_math: agent_maths.agent.agent_math
  agent_summary: agent_summary.agent.agent_summary
  exceptions: google.cloud.exceptions
  genai: google.genai
  GenerateContentConfig: google.genai.types.GenerateContentConfig
  json: json
  load_dotenv: dotenv.load_dotenv
  Optional: typing.Optional
  os: os
  root_agent: agent_teaching_assistant.agent.root_agent
  SequentialAgent: google.adk.agents.SequentialAgent
  storage: google.cloud.storage
  time: time
  Tuple: typing.Tuple
  types: google.genai.types
  vertexai: vertexai

functions:
  add:
    type: sync
    module: agent_maths.agent
    args: [numbers]
    params:
      returns: int
  check_grammar:
    type: sync
    module: agent_grammar.agent
    args: [text_input]
    params:
      returns: dict
  check_or_create_gcs_bucket_with_url:
    type: sync
    module: deploy_agent_to_agentengine
    args: [bucket_name, location, project_id]
    params:
      returns: Optional[Tuple]
  divide:
    type: sync
    module: agent_maths.agent
    args: [numbers]
    params:
      returns: float
  multiply:
    type: sync
    module: agent_maths.agent
    args: [numbers]
    params:
      returns: int
  parse_event_content:
    type: sync
    module: deploy_agent_to_agentengine
    args: [event]
    params:
      returns: list
  subtract:
    type: sync
    module: agent_maths.agent
    args: [numbers]
    params:
      returns: int

variables:
  GOOGLE_CLOUD_LOCATION:
    type: env
    params:
      caller: [os.getenv]
      path: [dotenv_path]
  GOOGLE_CLOUD_PROJECT:
    type: env
    params:
      caller: [os.getenv]
      path: [dotenv_path]
  MODEL:
    type: env
    params:
      caller: [os.getenv]
      path: [dotenv_path]

files:
  .env:
    type: pattern
    actions: [read]
    params:
      caller: [os.path.join]
      pattern: [os.path.dirname(), "..", .env]
